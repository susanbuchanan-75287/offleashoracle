name: Build daily wisdom archive

# Rebuilds archive.html once per day so one more reading is revealed each
# morning (the "drip"). Runs shortly after 00:00 UTC, when a new day — and
# therefore a new reading — becomes available. Also runnable on demand.

on:
  schedule:
    - cron: '5 0 * * *'   # 00:05 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-archive
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # SSH deploy key (secret ARCHIVE_DEPLOY_KEY) for pushing back to main.
          # The built-in GITHUB_TOKEN cannot bypass the "Protect main" ruleset, so
          # the daily push authenticates via a writable deploy key, which is a
          # bypass actor on the ruleset. checkout configures the SSH remote and
          # persists credentials, so the later `git push` works with no PAT.
          ssh-key: ${{ secrets.ARCHIVE_DEPLOY_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Rebuild archive.html
        run: node scripts/build-archive.js

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain archive.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add archive.html
            git commit -m "Reveal today's reading in the wisdom archive"
            git push
            echo "archive.html updated and pushed."
          else
            echo "No change to archive.html today."
          fi
